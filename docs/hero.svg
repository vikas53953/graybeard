<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Graybeard — the senior engineer for people who don't write code">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b26"/>
    </linearGradient>
    <linearGradient id="beard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b949e"/>
      <stop offset="1" stop-color="#484f58"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="318" rx="13" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- terminal window chrome -->
  <circle cx="34" cy="30" r="7" fill="#f85149"/>
  <circle cx="58" cy="30" r="7" fill="#d29922"/>
  <circle cx="82" cy="30" r="7" fill="#3fb950"/>
  <text x="600" y="35" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#484f58">~/your-idea — graybeard v0.2</text>
  <line x1="0" y1="50" x2="1200" y2="50" stroke="#30363d" stroke-width="1"/>

  <!-- the graybeard glyph: a terminal caret wearing a beard -->
  <g transform="translate(88,108)">
    <!-- prompt chevron -->
    <path d="M 0 8 L 34 34 L 0 60" fill="none" stroke="#3fb950" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- beard strands falling from the chevron tip -->
    <g stroke="url(#beard)" stroke-width="7" stroke-linecap="round" fill="none">
      <path d="M 30 44 C 26 74, 30 96, 22 122"/>
      <path d="M 44 40 C 44 74, 50 100, 44 130"/>
      <path d="M 58 44 C 62 74, 60 98, 68 120"/>
    </g>
    <!-- cursor block -->
    <rect x="78" y="44" width="26" height="12" rx="2" fill="#3fb950" opacity="0.9"/>
  </g>

  <!-- wordmark -->
  <text x="248" y="150" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="64" font-weight="700" letter-spacing="6" fill="#e6edf3">GRAYBEARD</text>

  <!-- tagline -->
  <text x="250" y="192" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="20" fill="#8b949e">Others review the code.</text>
  <text x="250" y="220" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="20" fill="#e6edf3">Graybeard runs the app — <tspan fill="#3fb950">and never forgets.</tspan></text>

  <!-- pipeline gate dots -->
  <g transform="translate(250,262)" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" fill="#484f58">
    <circle cx="6" cy="-4" r="5" fill="#3fb950"/><text x="18" y="0">brief</text>
    <line x1="62" y1="-4" x2="86" y2="-4" stroke="#30363d" stroke-width="2"/>
    <circle cx="94" cy="-4" r="5" fill="#3fb950"/><text x="106" y="0">mocks</text>
    <line x1="160" y1="-4" x2="184" y2="-4" stroke="#30363d" stroke-width="2"/>
    <circle cx="192" cy="-4" r="5" fill="#3fb950"/><text x="204" y="0">build</text>
    <line x1="250" y1="-4" x2="274" y2="-4" stroke="#30363d" stroke-width="2"/>
    <circle cx="282" cy="-4" r="5" fill="#d29922"/><text x="294" y="0">vibe-qa</text>
    <line x1="356" y1="-4" x2="380" y2="-4" stroke="#30363d" stroke-width="2"/>
    <circle cx="388" cy="-4" r="5" fill="#8b949e"/><text x="400" y="0">ship with receipts</text>
  </g>

  <!-- right-side proof strip -->
  <g transform="translate(880,96)" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15">
    <text x="0" y="0" fill="#3fb950">$ built under its own rules</text>
    <text x="0" y="30" fill="#8b949e">gates approved ......... 4/4</text>
    <text x="0" y="56" fill="#8b949e">QA paths run ......... 18/18</text>
    <text x="0" y="82" fill="#8b949e">review issues logged .... 10</text>
    <text x="0" y="108" fill="#8b949e">receipts in repo ....... yes</text>
    <text x="0" y="140" fill="#e6edf3">for people who don't code<tspan fill="#3fb950">_</tspan></text>
  </g>
</svg>
